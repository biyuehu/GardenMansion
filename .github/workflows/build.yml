name: Build & Upload Artifacts

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.40"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PureScript
        uses: purescript-contrib/setup-purescript@main
        with:
          purescript: "latest"
          spago: "latest"

      - name: Install Idris2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chezscheme

      - name: Setup Idris2 (via pack)
        run: |
          curl -sSL https://raw.githubusercontent.com/stefan-hoeck/idris2-pack/main/install.sh | bash
          echo "$HOME/.pack/bin" >> $GITHUB_PATH
          pack install idris2

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip

      - name: Run just build
        run: just build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Backend Build
        uses: actions/upload-artifact@v4
        with:
          name: backend-output
          path: server/output
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Database Build
        uses: actions/upload-artifact@v4
        with:
          name: db-build
          path: db
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Artifacts (Combined)
        uses: actions/upload-artifact@v4
        with:
          name: full-build-artifacts
          path: |
            client/dist/
            server/output/
            db/
          retention-days: 30
          if-no-files-found: warn
